<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary Meta Tags -->
    <title>First Loop — Rate, Rank & Discover Golf Courses</title>
    <meta name="title"       content="First Loop — Rate, Rank & Discover Golf Courses" />
    <meta name="description" content="Track every golf course you play. Rate conditions, value & facilities. See national and state rankings powered by real golfer reviews. 2,900+ courses across America." />
    <meta name="keywords"    content="golf course ratings, golf course reviews, best golf courses, golf course rankings, rate golf courses, golf app, top 100 golf courses, golf course finder" />
    <meta name="author"      content="First Loop" />
    <meta name="theme-color" content="#1B3054" />
    <meta name="robots"      content="index, follow" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable"         content="yes" />
    <meta name="apple-mobile-web-app-capable"   content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title"     content="First Loop" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/caddie-icon.png" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://firstloopgolf.com" />
    <meta property="og:title"       content="First Loop — Rate, Rank & Discover Golf Courses" />
    <meta property="og:description" content="Track every golf course you play. Rate conditions, value & facilities. See national and state rankings powered by real golfer reviews." />
    <meta property="og:image"       content="https://firstloop.vercel.app/logo.png" />
    <meta property="og:site_name"   content="First Loop" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="First Loop — Rate, Rank & Discover Golf Courses" />
    <meta name="twitter:description" content="Track every golf course you play. Rate conditions, value & facilities. 2,900+ courses across America." />
    <meta name="twitter:image"       content="https://firstloop.vercel.app/logo.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://firstloop.vercel.app" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

    <!-- Safe area for iPhone notch -->
    <style>
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
